name: Deploy Website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4

      - name: Download latest release EXEs
        run: |
          echo "Fetching latest release assets..."
          gh release download latest \
            --repo NGXSMK/ngxsmk-gamenet-optimizer \
            --dir public/assets \
            --pattern "*.exe" \
            --skip-existing 2>/dev/null || echo "No release assets found (build may still be running)"
          ls -la public/assets/ 2>/dev/null || echo "assets/ is empty"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install dependencies
        run: npm install

      - name: Build website
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
